name: Build and Release

# Triggered only on version tags so random pushes don't spam Releases.
# Push a tag with `git tag v1.2.3 && git push origin v1.2.3` to cut one.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # Gate: nothing ships unless unit tests are green. Integration tests
  # need Docker-in-Docker and are slower — we run them too since the
  # runners have Docker available, but if that ever becomes flaky you
  # can swap `make test` for `make test-unit` here.
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: |
            api/go.sum
            desktop/go.sum

      - name: Run api tests
        run: make test

      - name: Run desktop tests
        run: cd desktop && go test ./...

  # Desktop builds run in parallel across OSes via a matrix. Both legs
  # depend on `test` so a red build never produces release artifacts.
  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      # Don't cancel the other OS on a single failure — we still want
      # to see e.g. a windows-only break alongside a linux success.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            binary: mist-drive
            archive: mist-drive-linux-amd64.tar.gz
          - os: windows-latest
            platform: windows
            arch: amd64
            binary: mist-drive.exe
            archive: mist-drive-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: desktop/go.sum

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend deps
        run: cd desktop/frontend && bun install

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd desktop
          wails build -tags webkit2_41 -o ${{ matrix.binary }} \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA::7}"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd desktop
          wails build -o ${{ matrix.binary }} \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA::7}"

      - name: Archive (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist
          cp desktop/build/bin/${{ matrix.binary }} dist/
          tar -C dist -czf dist/${{ matrix.archive }} ${{ matrix.binary }}
          rm dist/${{ matrix.binary }}

      - name: Archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item desktop/build/bin/${{ matrix.binary }} dist/
          Compress-Archive -Path dist/${{ matrix.binary }} -DestinationPath dist/${{ matrix.archive }}
          Remove-Item dist/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*

  # Final job: pulls all artifacts and cuts the GitHub release. Only
  # runs if every build matrix leg succeeded, so releases are always
  # either complete or not created.
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build-desktop
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
