name: release

# Cut a release: git tag v1.2.3 && git push origin v1.2.3
# All jobs are gated on `test`. Docker + desktop builds run in parallel
# once tests are green. The final `release` job waits for every leg and
# then publishes GitHub release notes + desktop binaries.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: |
            api/go.sum
            desktop/go.sum

      - name: Run api tests
        run: make test

      - name: Run desktop tests
        run: cd desktop && go test ./...

  build-docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mist-drive
          # Exact semver tag (e.g. 1.2.3) + `latest`.
          # No sha floaters — registry filled up too fast last time.
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

  build-desktop:
    name: Build desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      # Keep both legs running even if one fails — useful to see e.g.
      # a windows-only break alongside a linux success.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            binary: mist-drive
            archive: mist-drive-linux-amd64.tar.gz
          - os: windows-latest
            platform: windows
            arch: amd64
            binary: mist-drive.exe
            archive: mist-drive-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: desktop/go.sum

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install shared deps
        run: cd shared && bun install --frozen-lockfile

      - name: Install frontend deps
        run: cd desktop/frontend && bun install

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd desktop
          wails build -tags webkit2_41 -o ${{ matrix.binary }} \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${GITHUB_SHA::7}"

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          cd desktop
          wails build -o ${{ matrix.binary }} \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME#v} -X main.commit=${GITHUB_SHA::7}"

      - name: Archive (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p dist
          cp desktop/build/bin/${{ matrix.binary }} dist/
          tar -C dist -czf dist/${{ matrix.archive }} ${{ matrix.binary }}
          rm dist/${{ matrix.binary }}

      - name: Archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item desktop/build/bin/${{ matrix.binary }} dist/
          Compress-Archive -Path dist/${{ matrix.binary }} -DestinationPath dist/${{ matrix.archive }}
          Remove-Item dist/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: Publish release
    runs-on: ubuntu-latest
    # Wait for both Docker push and all desktop matrix legs.
    needs: [build-docker, build-desktop]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
