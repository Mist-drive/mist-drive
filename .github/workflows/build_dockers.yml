name: build_dockers
# Triggered only on version tags so every main push doesn't rebuild
# and shove a new image into Docker Hub. Cut a release the same way as
# the desktop workflow: `git tag v1.2.3 && git push origin v1.2.3`.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

jobs:
  mist-drive:
    # Single unified image: the Dockerfile's multi-stage build pulls in
    # both ./api (Go) and ./web (Vite) from the repo root and embeds
    # the built SPA into the Go binary via //go:embed. One tag → one
    # image to deploy.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mist-drive
          # Two tags only: the exact version (1.0.0) and `latest` so a
          # compose `image: user/mist-drive:latest` just pulls the most
          # recent release. No sha tags, no major.minor floaters — the
          # registry filled up too fast last time. `latest` is auto-set
          # to the highest semver tag by `flavor: latest=true`, even
          # when the trigger is a tag push (the default would only
          # mark it on branch pushes).
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
