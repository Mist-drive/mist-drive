# mist-drive local / single-node compose.
#
# No Traefik, no TLS, no self-signed certs — the deployment target is
# an existing stack (e.g. cy17-single-node-services-stack) that already
# terminates HTTPS and routes by hostname. This file just brings up
# the two things mist-drive actually needs: the unified app container
# and MinIO. Your outer reverse proxy points `drive.<domain>` at
# mist-drive:3000 and `s3.<domain>` at minio:9000.
services:
  mist-drive:
    # Single unified image: Go API + embedded Vite SPA. Serves / and
    # /api/* on the same port — no separate web container.
    build:
      context: ..
      dockerfile: api/Dockerfile
      # BuildKit's default bridge network can fail to resolve
      # proxy.golang.org / registry.bun.sh on some hosts; host network
      # sidesteps it and the build itself still runs in an isolated
      # container.
      network: host
    image: mist-drive:local
    environment:
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL}
      ADMIN_LOGIN: ${ADMIN_LOGIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATA_DIR: /data
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: "false"
      PUBLIC_S3_HOST: ${S3_DOMAIN}
      DEFAULT_QUOTA_BYTES: ${DEFAULT_QUOTA_BYTES}
      UPLOAD_TTL_HOURS: ${UPLOAD_TTL_HOURS}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./data/api:/data
      - ./data/logs:/app/logs
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER: ${MINIO_BROWSER}
      # Transparent server-side compression. "*" wildcards match every
      # object; MinIO internally skips already-compressed formats (zip,
      # mp4, jpg, gz, …) so we don't waste CPU on them. Compressed
      # objects still report their ORIGINAL (uncompressed) size via
      # HEAD/GET, so usedBytes quota accounting stays consistent with
      # what the user actually uploaded.
      MINIO_COMPRESSION_ENABLE: "on"
      MINIO_COMPRESSION_EXTENSIONS: "*"
      MINIO_COMPRESSION_MIME_TYPES: "*"
    volumes:
      - ./data/minio:/data
    # Exposed on the host so the browser can PUT presigned part URLs
    # directly to MinIO during local dev (PUBLIC_S3_HOST=localhost:9000).
    # In your real deployment the outer reverse proxy should publish
    # minio:9000 under `s3.<domain>` instead.
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
