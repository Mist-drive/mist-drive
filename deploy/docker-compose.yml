services:
  traefik:
    image: traefik:v3.1.6
    profiles: ["tls"]
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.file.filename=/etc/traefik/dynamic.yml
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/certs:/certs:ro
    restart: always
    mem_limit: 128m
    cpus: 0.25
    networks: [mist]

  api:
    build:
      context: ../api
      # BuildKit's default bridge network can fail to resolve
      # proxy.golang.org on some hosts; host network sidesteps it and
      # the build itself still runs in an isolated container.
      network: host
    environment:
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL}
      ADMIN_LOGIN: ${ADMIN_LOGIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATA_DIR: /data
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_USE_SSL: "false"
      PUBLIC_S3_HOST: ${S3_DOMAIN}
      DEFAULT_QUOTA_BYTES: ${DEFAULT_QUOTA_BYTES}
      UPLOAD_TTL_HOURS: ${UPLOAD_TTL_HOURS}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./data/api:/data
      - ./data/logs:/app/logs
    depends_on:
      minio:
        condition: service_healthy
    restart: always
    mem_limit: 256m
    cpus: 0.5
    networks: [mist]
    # exposed directly for `docker compose up` without --profile tls
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/auth`))"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.middlewares=api-ratelimit@docker"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=50"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=100"
      - "traefik.http.services.api.loadbalancer.server.port=3000"

  web:
    build: ../web
    depends_on:
      api:
        condition: service_healthy
    restart: always
    mem_limit: 64m
    cpus: 0.25
    networks: [mist]
    ports:
      - "5173:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.services.web.loadbalancer.server.port=80"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER: ${MINIO_BROWSER}
      # Transparent server-side compression. "*" wildcards match every
      # object; MinIO internally skips already-compressed formats (zip,
      # mp4, jpg, gz, …) so we don't waste CPU on them. Compressed
      # objects still report their ORIGINAL (uncompressed) size via
      # HEAD/GET, so usedBytes quota accounting stays consistent with
      # what the user actually uploaded.
      MINIO_COMPRESSION_ENABLE: "on"
      MINIO_COMPRESSION_EXTENSIONS: "*"
      MINIO_COMPRESSION_MIME_TYPES: "*"
    volumes:
      - ./data/minio:/data
    # Exposed on the host ONLY so the browser can PUT presigned part URLs
    # directly to s3 during local dev (PUBLIC_S3_HOST=localhost:9000).
    # With the tls profile, drop these ports and let Traefik route s3.<domain>.
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: always
    mem_limit: 512m
    cpus: 1.0
    networks: [mist]
    # NOT exposed to host; only Traefik reaches it via the s3 router
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.s3.rule=Host(`${S3_DOMAIN}`)"
      - "traefik.http.routers.s3.entrypoints=websecure"
      - "traefik.http.routers.s3.tls=true"
      - "traefik.http.services.s3.loadbalancer.server.port=9000"

networks:
  mist: {}
