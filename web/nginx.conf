server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  access_log off;
  client_max_body_size 0;

  # Use Docker's embedded DNS and resolve the api upstream lazily via
  # a variable — otherwise nginx resolves `api` once at startup and
  # crashes the worker ("host not found in upstream") if the name
  # isn't ready the moment nginx boots.
  resolver 127.0.0.11 ipv6=off valid=10s;
  set $api_upstream "http://api:3000";

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # WebSocket endpoint — needs the Upgrade/Connection dance. Must be
  # declared before the generic /api/ block since nginx picks the
  # longest prefix match.
  location = /api/ws {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # Proxy API + auth to the Go service (resolved on the docker network)
  location /api/ {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
  }
  location /auth/ {
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Cache hashed static assets aggressively
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Never cache index.html so new bundles are picked up immediately
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
